services:
  web:
    image: chialab/php-dev:8.2-apache
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
    command: /bin/bash -c "sed -i 's|DocumentRoot /var/www/html|DocumentRoot /var/www/html/public|g' /etc/apache2/sites-enabled/000-default.conf && apache2-foreground"

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=employee_db
      - MYSQL_USER=ci_user
      - MYSQL_PASSWORD=ci_password
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: